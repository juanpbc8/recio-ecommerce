name: Deploy Storefront to GitHub Pages

on:
  push:
    branches: ['main'] # Solo se despliega lo que llega a main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # 'npm ci' es más rápido y seguro en CI que 'npm install'
        run: npm ci

      - name: Generate Database Types
        # Genera los tipos de Prisma para todo el monorepo
        run: npm run db:gen

      - name: Build Web Store
        # Buildeamos solo la web para ahorrar tiempo, pero ya con los tipos de la DB generados arriba.
        run: npx turbo build --filter=web-store

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './apps/web-store/out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
